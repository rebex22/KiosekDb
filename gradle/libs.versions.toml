material3 = "1.10.0-alpha05"
exposed = "1.2.0"
h2 = "2.4.240"
room = "3.0.0-alpha03"
sqlite = "2.7.0-alpha03"
sqliteBundledJvm = "2.6.2"
sqliteBundled = "2.6.2"
ktor = "3.4.2"
androidx-navigation = "2.9.2"
navigation-material = "1.9.3"
